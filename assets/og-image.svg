<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1B2E"/>
      <stop offset="100%" stop-color="#102A47"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#50E6FF"/>
      <stop offset="45%" stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#15B392"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#1B3A5C" opacity="0.6"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Logo mark -->
  <rect x="88" y="220" width="110" height="110" rx="24" fill="rgba(255,255,255,0.04)" stroke="rgba(80,230,255,0.15)" stroke-width="1"/>
  <path d="M168 255 L132 255 Q119 255 119 265 Q119 273 132 273 L148 273 Q161 273 161 284 Q161 292 148 292 L113 292"
        fill="none" stroke="url(#brand)" stroke-width="4.5" stroke-linecap="round"/>
  <circle cx="168" cy="255" r="5" fill="none" stroke="url(#brand)" stroke-width="2.5"/>
  <circle cx="113" cy="292" r="5" fill="none" stroke="url(#brand)" stroke-width="2.5"/>

  <!-- Name -->
  <text x="232" y="282" font-family="system-ui,-apple-system,sans-serif" font-weight="700"
        font-size="70" fill="#F8FAFC" letter-spacing="-2.5">Sami Mawass</text>

  <!-- Accent bar -->
  <rect x="232" y="302" width="90" height="4" rx="2" fill="url(#brand)"/>

  <!-- Title -->
  <text x="235" y="354" font-family="ui-monospace,monospace" font-size="21"
        fill="#50E6FF" letter-spacing="3.5">ANALYTICS ENGINEER</text>

  <!-- Tagline -->
  <text x="235" y="400" font-family="system-ui,-apple-system,sans-serif" font-size="19"
        fill="#64748B" letter-spacing="0.3">Power BI · SSAS Tabular · SQL · Microsoft Fabric</text>

  <!-- Bottom rule -->
  <rect x="88" y="518" width="1024" height="1.5" fill="url(#brand)" opacity="0.35"/>

  <!-- Stats line -->
  <text x="88" y="558" font-family="ui-monospace,monospace" font-size="15"
        fill="#475569" letter-spacing="0.5">18+ engagements · 7 countries · government, higher education, FMCG, energy</text>
</svg>
